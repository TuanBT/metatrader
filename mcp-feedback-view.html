<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>JSON Summary Cleaner</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f5f5f5;
    height:calc(100vh - 40px);
    display:flex;
    flex-direction:column;
}
h1{
    margin-bottom:5px;
    font-size:18px;
}
p{
    margin:0 0 10px;
    font-size:13px;
}
.input-row{
    display:flex;
    gap:10px;
    align-items:stretch;
    margin-bottom:10px;
}
.input-row textarea{
    flex:1;
    height:50px;
    padding:8px;
    font-family:monospace;
    font-size:14px;
    resize:vertical;
}
.input-row button{
    padding:8px 20px;
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
}
.output{
    flex:1;
    white-space:pre-wrap;
    background:white;
    padding:12px;
    border:1px solid #ccc;
    overflow:auto;
    font-size:14px;
    line-height:1.5;
}
.toolbar{
    margin-top:6px;
}
.toolbar button{
    padding:6px 16px;
    font-size:13px;
    cursor:pointer;
}
.scratchpad-row{
    display:flex;
    gap:10px;
    align-items:stretch;
    margin-top:8px;
}
.scratchpad-row textarea{
    flex:1;
    height:60px;
    padding:8px;
    font-family:monospace;
    font-size:14px;
    resize:vertical;
}
.scratchpad-row button{
    padding:8px 20px;
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
}
</style>
</head>
<body>

<h1>Clean JSON Summary → Văn xuôi</h1>
<p>Dán JSON vào input, ấn Convert để trích xuất summary.</p>

<div class="input-row">
<textarea id="input" placeholder="Paste JSON here..."></textarea>
<button onclick="processText()">Convert</button>
</div>

<div id="output" class="output"></div>

<div class="scratchpad-row">
<textarea id="scratchpad" placeholder="Gõ gì đó vào đây để copy nhanh..."></textarea>
<button onclick="copyScratchpad()">Copy</button>
</div>

<div class="toolbar">
<button onclick="copyOutput()">Copy Output</button>
</div>

<script>

function cleanMarkdown(text){

    // remove **bold**
    text = text.replace(/\*\*(.*?)\*\*/g, "$1");

    // remove ### headers
    text = text.replace(/^#{1,6}\s*/gm,"");

    // keep code block but remove ```
    text = text.replace(/```/g,"");

    return text;
}

function processText(){
    let raw = document.getElementById("input").value.trim();
    let output = "";

    try{
        let json = JSON.parse(raw);
        if(json.summary){
            output = cleanMarkdown(json.summary);
        }else{
            output = "Không tìm thấy field 'summary'";
        }
    }catch(e){

        // fallback: try extract summary manually
        let match = raw.match(/"summary"\s*:\s*"([\s\S]*?)"\s*,/);
        if(match){
            output = cleanMarkdown(match[1].replace(/\\n/g,"\n"));
        }else{
            output = "Không parse được JSON.";
        }
    }

    document.getElementById("output").textContent = output;
}

function copyOutput(){
    let text = document.getElementById("output").textContent;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

function copyScratchpad(){
    let text = document.getElementById("scratchpad").value;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

</script>

</body>
</html>
